version: '3.8'

services:
  udeo-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: udeo:3.1.0
    container_name: udeo-core
    environment:
      - UDEO_WORKSPACE=/workspace
    volumes:
      - udeo_data:/workspace
    entrypoint: ["dotnet", "udeo.dll"]

  # Optional: PostgreSQL for persistent storage (future enhancement)
  postgres:
    image: postgres:16-alpine
    container_name: udeo-postgres
    environment:
      POSTGRES_DB: udeo
      POSTGRES_USER: udeo
      POSTGRES_PASSWORD: udeo_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles:
      - full

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: udeo-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - full

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: udeo-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  udeo_data:
  postgres_data:
  prometheus_data:
  grafana_data:
